# 青龙定时任务配置文件
# 格式：脚本路径 -> cron 表达式
# 青龙面板会自动识别这些配置并应用到对应的定时任务

# ==================== JavaScript 脚本 ====================

# 掘金签到系列 - 每天 9:51 执行（避开高峰期）
js/juejin_v3.js: 51 9 * * *
js/juejin_v2.js: 51 9 * * *

# ==================== Python 脚本 ====================

# Google Voice 保号短信 - 每 2 个月 1 号 0:00 执行
python/google_voice_auto_sms.py: 0 0 1 */2 *

# 百度贴吧签到 - 每天 9:00 执行
python/baidu_tieba.py: 0 9 * * *

# 百度网盘签到 + 每日一题 - 每天 8:00 执行
python/baidu_wangpan.py: 0 8 * * *

# ==================== Cron 表达式参考 ====================
# 0 9 * * *       - 每天 9:00
# 0 8,20 * * *    - 每天 8:00 和 20:00
# */5 * * * *     - 每 5 分钟
# 0 0 * * 0       - 每周日 0:00
# 0 0 */15 * * *  - 每 15 天 0:00
# 51 9 * * *      - 每天 9:51
